<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">عروض شركة مياه الواحة</title>
  <desc id="desc">بانر مربع لعرض خصم 50% على 20 كرتون مياه 200 مل مع هدية براد مياه</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8fcff"/>
      <stop offset="54%" stop-color="#b7ecf7"/>
      <stop offset="100%" stop-color="#76d6ef"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#063d7b"/>
      <stop offset="100%" stop-color="#0275d8"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff62ad"/>
      <stop offset="100%" stop-color="#e51677"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#043964" flood-opacity=".22"/>
    </filter>
    <filter id="smallShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#064c86" flood-opacity=".18"/>
    </filter>
    <style>
      .rtl { direction: rtl; unicode-bidi: plaintext; font-family: "Cairo", "Tajawal", Arial, Tahoma, sans-serif; }
      .headline { fill: #073c75; font-weight: 900; font-size: 48px; }
      .offer { fill: #fff; font-weight: 900; font-size: 88px; }
      .body { fill: #083c75; font-weight: 900; font-size: 42px; }
      .detail { fill: #154f82; font-weight: 800; font-size: 31px; }
      .price-label { fill: #073c75; font-weight: 900; font-size: 30px; }
      .price { fill: #e51677; font-weight: 900; font-size: 72px; }
      .gift { fill: #fff; font-weight: 900; font-size: 26px; }
      .feature { fill: #083c75; font-weight: 900; font-size: 20px; }
      .feature-sub { fill: #23668f; font-weight: 800; font-size: 16px; }
    </style>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <path d="M-20 148C110 54 251 70 386 122c161 62 294 50 423-25 95-55 172-65 239-33v-96H-20Z" fill="#fff" opacity=".45"/>
  <path d="M-20 856c145-88 301-85 455-30 161 58 313 72 466-6 65-33 113-39 147-31v260H-20Z" fill="#eefcff" opacity=".72"/>
  <path d="M642 126c91 34 167 22 262-25" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" opacity=".72"/>
  <path d="M60 352c82-42 169-31 255 26" fill="none" stroke="#6dcce8" stroke-width="8" stroke-linecap="round" opacity=".56"/>
  <circle cx="78" cy="104" r="24" fill="#fff" opacity=".58"/>
  <circle cx="132" cy="186" r="12" fill="#fff" opacity=".67"/>
  <circle cx="892" cy="215" r="32" fill="#fff" opacity=".46"/>
  <circle cx="952" cy="284" r="15" fill="#fff" opacity=".66"/>
  <circle cx="460" cy="109" r="10" fill="#fff" opacity=".55"/>
  <circle cx="350" cy="802" r="18" fill="#fff" opacity=".55"/>

  <g filter="url(#smallShadow)">
    <circle cx="92" cy="88" r="49" fill="#fff"/>
    <image href="me.png" x="53" y="49" width="78" height="78" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g text-anchor="middle">
    <text class="rtl headline" x="512" y="110">عروض شركة مياه الواحة</text>
    <g filter="url(#smallShadow)">
      <rect x="326" y="138" width="372" height="120" rx="60" fill="url(#blue)"/>
      <text class="rtl offer" x="512" y="223">خصم 50%</text>
    </g>
    <text class="rtl body" x="512" y="318">اطلب 20 كرتون مياه</text>
    <text class="rtl detail" x="512" y="370">20 كرتون - 200 مل - 30 عبوة</text>
    <text class="rtl price-label" x="512" y="425">السعر:</text>
    <text class="rtl price" x="512" y="501">18 ريال فقط</text>
    <text class="rtl detail" x="512" y="556">مع هدية براد مياه</text>
  </g>

  <g filter="url(#softShadow)">
    <image href="Big-Dispencer-copy-1-2.png" x="70" y="514" width="255" height="245" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <g filter="url(#softShadow)">
    <image href="Asset-2.png" x="460" y="558" width="440" height="220" preserveAspectRatio="xMidYMid meet"/>
    <image href="30-Anniversary-product-line-up_200ml-2.png" x="414" y="583" width="130" height="186" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g filter="url(#smallShadow)">
    <circle cx="257" cy="512" r="85" fill="url(#pink)"/>
    <text class="rtl gift" x="257" y="500" text-anchor="middle">هدية</text>
    <text class="rtl gift" x="257" y="535" text-anchor="middle">براد مياه</text>
  </g>

  <g transform="translate(58 830)">
    <rect width="908" height="142" rx="34" fill="#ffffff" opacity=".92" filter="url(#smallShadow)"/>
    <g transform="translate(712 28)" text-anchor="end">
      <circle cx="52" cy="26" r="23" fill="#e51677"/>
      <path d="M40 26h24M52 14v24" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <text class="rtl feature" x="0" y="19">توصيل مجاني</text>
      <text class="rtl feature-sub" x="0" y="48">داخل نطاق الخدمة</text>
    </g>
    <g transform="translate(362 28)" text-anchor="end">
      <circle cx="52" cy="26" r="23" fill="#0275d8"/>
      <path d="M39 29c10-22 28-22 27 0-1 15-27 15-27 0Z" fill="#fff"/>
      <text class="rtl feature" x="0" y="19">مياه متوازنة نقية وصحية</text>
      <text class="rtl feature-sub" x="0" y="48">انتعاش بجودة موثوقة</text>
    </g>
    <g transform="translate(712 84)" text-anchor="end">
      <circle cx="52" cy="26" r="23" fill="#0b4f8f"/>
      <text x="52" y="35" text-anchor="middle" fill="#fff" font-size="22" font-weight="900">0</text>
      <text class="rtl feature" x="0" y="19">صفر صوديوم</text>
      <text class="rtl feature-sub" x="0" y="48">خيار صحي لعائلتك</text>
    </g>
    <g transform="translate(362 84)" text-anchor="end">
      <circle cx="52" cy="26" r="23" fill="#e51677"/>
      <path d="M39 27l9 9 18-22" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="rtl feature" x="0" y="19">جودة مضمونة</text>
      <text class="rtl feature-sub" x="0" y="48">منتجات أصلية 100%</text>
    </g>
  </g>
</svg>
